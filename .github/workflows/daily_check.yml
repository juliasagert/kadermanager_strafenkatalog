name: Kadermanager Daily Check

on:
  schedule:
    # Führt das Skript jeden Samstag um 06:00 UTC aus (ca. 07:00/8:00 Uhr deutsche Zeit)
    - cron: '0 6 * * 6'
  workflow_dispatch: # Erlaubt es dir, das Skript manuell per Button zu starten

jobs:
  run-checker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
        # Wir installieren Playwright und die Browser-Engines in der Cloud
      run: |
        pip install playwright gspread oauth2client python-dotenv
        playwright install chromium

    - name: Run script
      env:
        # Hier verknüpfen wir die GitHub Secrets mit dem Skript
        KADER_USER: ${{ secrets.KADER_USER }}
        KADER_PW: ${{ secrets.KADER_PW }}
        KADER_URL: ${{ secrets.KADER_URL }}
        GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python kadermanager_checker.py

    - name: Send Mail on Failure
      if: failure() # Wird nur ausgeführt, wenn der Schritt davor gecrasht ist
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "❌ Kadermanager Checker Fehler"
        to: "julia.sagert@gmail.com"
        from: "GitHub Actions Bot"
        body: "Der Kadermanager-Check ist fehlgeschlagen. Bitte prüfe die Logs auf GitHub!"
        